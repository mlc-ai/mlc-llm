name: Build AISODChat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        working-directory: android/MLCChat
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AISODChat-debug
          path: android/MLCChat/app/build/outputs/apk/debug/app-debug.apk
